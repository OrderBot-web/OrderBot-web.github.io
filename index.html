<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>OrderBot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix"></canvas>

<!-- Navbar: appare dopo login -->
<div id="navbar" style="display:none;">
  <button onclick="scrollToSection('botSection')">Order Bot</button>
  <button onclick="scrollToSection('hostSection')">Host H24</button>
  <button onclick="scrollToSection('aboutSection')">About Us</button>
  <span id="loginNick" style="margin-left:auto;color:#00ff9d;"></span>
</div>

<!-- Schermata login iniziale -->
<div id="startScreen" class="center-box">
  <h1>OrderBot</h1>
  <button id="loginBtn">Login Discord</button>
</div>

<!-- Schermata principale -->
<div id="mainScreen" style="display:none;">

  <!-- Quadrati Bot -->
  <div id="botSection" class="bot-boxes">
    <div class="bot-card" id="configBot">
      <h2>Order Bot</h2>
      <p>Clicca per configurare il tuo bot</p>
    </div>
  </div>

  <div id="hostSection" class="bot-boxes">
    <div class="bot-card" id="hostBot">
      <h2>Host Bot H24</h2>
      <p>Clicca per configurare l’hosting</p>
      <small>Apri ticket nel server Discord</small>
    </div>
  </div>

  <!-- Form configurazione -->
  <div id="formScreen" style="display:none;">
    <form id="orderForm">
      <h2 id="botFormTitle">Configura Bot</h2>
      <input type="text" id="botName" placeholder="Nome bot" required>
      <textarea id="description" placeholder="Descrizione bot"></textarea>
      <input type="text" id="budgetField" placeholder="Budget richiesto" required>
      <button type="submit">Invia Ordine</button>
    </form>
  </div>

  <!-- Pulsante Discord in basso -->
  <div style="text-align:center;margin-top:40px;">
    <button id="joinDiscord">Entra nel nostro Discord</button>
  </div>

  <!-- About Us / Chi Siamo -->
  <div id="aboutSection" class="about-section">
    <h2>About Us</h2>
    <p>🔥 OrderBot - Il tuo bot Discord veloce e sicuro</p>
    <p>💻 Creato da [pasquitos]</p>
    <p>🌐 Supportato da GitHub Pages & Webhook Discord</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
