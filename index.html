<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Bot Discord - TOP Edition</title>
    <style>
        :root {
            --discord-blurple: #5865F2;
            --discord-dark: #23272A;
            --discord-darker: #1E1F22;
            --text-light: #F2F3F5;
            --success-green: #43b581;
            --danger-red: #ed4245;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1011 0%, var(--discord-darker) 100%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(35, 39, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }

        .glass-panel.active {
            display: block;
            animation: popIn 0.6s ease forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to right, #5865F2, #a1a9f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #949BA4;
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* Profilo Utente */
        .user-profile {
            display: none; /* Mostrato solo se loggato */
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(88, 101, 242, 0.3);
        }

        .user-profile img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--discord-blurple);
        }

        .user-info {
            text-align: left;
        }

        .user-info span {
            display: block;
            font-size: 12px;
            color: #949BA4;
            text-transform: uppercase;
            font-weight: bold;
        }

        .user-info strong {
            font-size: 18px;
            color: white;
        }

        /* Form Input */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #B5BAC1;
            text-transform: uppercase;
            font-weight: bold;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.2);
            border: 2px solid #2B2D31;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--discord-blurple);
            background: rgba(0,0,0,0.4);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Pulsanti */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: var(--discord-blurple);
            color: white;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #4752C4;
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background-color: #3b4045;
            color: #7b7e82;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-discord {
            background-color: white;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-discord:hover {
            background-color: #e3e5e8;
            transform: translateY(-2px);
        }

        .btn-discord img {
            width: 20px;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            padding: 10px;
            border-radius: 8px;
        }

        .success { background: rgba(67, 181, 129, 0.2); color: var(--success-green); border: 1px solid var(--success-green); }
        .error { background: rgba(237, 66, 69, 0.2); color: var(--danger-red); border: 1px solid var(--danger-red); }

        /* Torna indietro */
        .back-link {
            color: #949BA4;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            display: inline-block;
            margin-top: 10px;
        }
        .back-link:hover { color: white; }

    </style>
</head>
<body>

    <div class="glass-panel active" id="home-section">
        <h2>Developer Hub</h2>
        <p class="subtitle">Il portale esclusivo per ordinare il tuo bot personalizzato.</p>

        <div class="user-profile" id="user-profile">
            <img id="user-avatar" src="" alt="Avatar">
            <div class="user-info">
                <span>Connesso come</span>
                <strong id="user-username">Utente</strong>
            </div>
        </div>

        <button class="btn-primary" id="btn-ordina" onclick="openOrderForm()" disabled>
            ⚡ Ordina Bot
        </button>
        
        <button class="btn-discord" id="btn-login" onclick="loginWithDiscord()">
            <img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord">
            Registrati con Discord
        </button>
    </div>

    <div class="glass-panel" id="order-section">
        <h2>Nuovo Ordine</h2>
        <p class="subtitle">Descrivi esattamente cosa ti serve.</p>
        
        <div class="input-group">
            <label for="botName">Nome del Bot</label>
            <input type="text" id="botName" placeholder="es. DiscoBot" required>
        </div>
        
        <div class="input-group">
            <label for="botDesc">Funzionalità e Descrizione</label>
            <textarea id="botDesc" placeholder="Lista dei comandi, sistemi di moderazione, ticket, ecc..." required></textarea>
        </div>
        
        <button class="btn-primary" onclick="sendToDiscord()" id="btn-invia">INVIA ORDINE</button>
        
        <div class="status-msg success" id="status-success">✅ Ordine inviato con successo!</div>
        <div class="status-msg error" id="status-error">❌ Errore durante l'invio.</div>
        
        <a class="back-link" onclick="goHome()">← Torna alla Home</a>
    </div>

    <script>
        // ==========================================
        // CONFIGURAZIONE DA COMPILARE ASSOLUTAMENTE
        // ==========================================
        const CLIENT_ID = '1482413294336868584'; 
        const REDIRECT_URI = 'https://order-bot.github.io/index.htm'; // es. http://localhost:5500/index.html o il tuo link GitHub Pages
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1482410262865776741/3aqrc9fTEp0TktXccOavkJcnWooBaDX8SJOh9YubenMssCXmSmHBF0_KwcV5WUqNAJ4s';
        // ==========================================

        let currentUser = null; // Salverà i dati dell'utente

        // Al caricamento della pagina, controlla se c'è l'access token nell'URL (ritorno da Discord)
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            const [accessToken, tokenType] = [fragment.get('access_token'), fragment.get('token_type')];

            if (accessToken) {
                // Pulisce l'URL per renderlo bello
                window.history.replaceState({}, document.title, window.location.pathname);
                fetchDiscordProfile(tokenType, accessToken);
            }
        };

        // Reindirizza l'utente alla pagina di login di Discord
        function loginWithDiscord() {
            if (CLIENT_ID === '1482413294336868584') {
                alert("Errore!");
                return;
            }
            const authUrl = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=identify`;
            window.location.href = authUrl;
        }

        // Recupera i dati del profilo tramite le API ufficiali di Discord
        async function fetchDiscordProfile(tokenType, accessToken) {
            try {
                const response = await fetch('https://discord.com/api/users/@me', {
                    headers: { authorization: `${tokenType} ${accessToken}` }
                });
                
                if (response.ok) {
                    currentUser = await response.json();
                    updateUIWithUser(currentUser);
                } else {
                    console.error("Token non valido o scaduto");
                }
            } catch (error) {
                console.error("Errore nel fetch del profilo:", error);
            }
        }

        // Aggiorna l'interfaccia quando l'utente è loggato
        function updateUIWithUser(user) {
            // Nascondi pulsante login, sblocca ordini, mostra profilo
            document.getElementById('btn-login').style.display = 'none';
            const btnOrdina = document.getElementById('btn-ordina');
            btnOrdina.disabled = false;
            btnOrdina.innerText = "⚡ Ordina Bot ORA";

            document.getElementById('user-profile').style.display = 'flex';
            document.getElementById('user-username').innerText = user.global_name || user.username;
            
            // Imposta l'avatar (se l'utente non ha l'avatar, usa quello di default di discord)
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png` 
                : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.discriminator || 0) % 5}.png`;
            document.getElementById('user-avatar').src = avatarUrl;
        }

        // Navigazione tra le pagine
        function openOrderForm() {
            document.getElementById('home-section').classList.remove('active');
            setTimeout(() => {
                document.getElementById('order-section').classList.add('active');
            }, 50); // Piccolo delay per la fluidità dell'animazione
        }

        function goHome() {
            document.getElementById('order-section').classList.remove('active');
            setTimeout(() => {
                document.getElementById('home-section').classList.add('active');
            }, 50);
        }

        // Invia i dati al Webhook Discord
        async function sendToDiscord() {
            if (!currentUser) {
                alert("Errore critico: non sei loggato!");
                return;
            }

            const botName = document.getElementById('botName').value.trim();
            const botDesc = document.getElementById('botDesc').value.trim();
            const btnInvia = document.getElementById('btn-invia');
            const statusSuccess = document.getElementById('status-success');
            const statusError = document.getElementById('status-error');

            if (!botName || !botDesc) {
                alert("Per favore, compila tutti i campi!");
                return;
            }

            btnInvia.innerText = "INVIO IN CORSO...";
            btnInvia.disabled = true;
            statusSuccess.style.display = 'none';
            statusError.style.display = 'none';

            // Costruzione dell'Embed super figo
            const payload = {
                embeds: [
                    {
                        title: "🛒 Nuovo Ordine, Pasquitos a lavoro!",
                        color: 5814783,
                        thumbnail: {
                            url: document.getElementById('user-avatar').src // Usa l'avatar dell'utente come miniatura!
                        },
                        fields: [
                            {
                                name: "👤 Richiesto da",
                                value: `<@${currentUser.id}> (${currentUser.username})`, // Tagga l'utente se è nel server!
                                inline: true
                            },
                            {
                                name: "🤖 Nome Bot",
                                value: `**${botName}**`,
                                inline: true
                            },
                            {
                                name: "📝 Descrizione & Funzioni",
                                value: `\`\`\`${botDesc}\`\`\``
                            }
                        ],
                        footer: {
                            text: "Sviluppo Autenticato tramite Hub"
                        },
                        timestamp: new Date().toISOString()
                    }
                ]
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusSuccess.style.display = 'block';
                    document.getElementById('botName').value = '';
                    document.getElementById('botDesc').value = '';
                } else {
                    statusError.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                statusError.style.display = 'block';
            } finally {
                btnInvia.innerText = "INVIA ORDINE";
                btnInvia.disabled = false;
            }
        }
    </script>
</body>
</html>
