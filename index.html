<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>OrderBot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>OrderBot</h1>
<p>Ordina il tuo bot Discord personalizzato</p>
<p>Order your custom Discord bot</p>
<form id="orderForm">
<input type="text" id="botName" placeholder="Nome bot" required>
<textarea id="description" placeholder="Descrizione bot"></textarea>
<input type="text" id="features" placeholder="Funzioni richieste">
<input type="text" id="contact" placeholder="Contatto Discord">
<button type="submit">Ordina Bot</button>
</form>
</div>
<script src="script.js"></script>
</body>
</html>
