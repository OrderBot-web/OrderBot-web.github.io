<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>OrderBot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix"></canvas>

<div class="order-container" id="startScreen">
  <h2>Vuoi ordinare un bot?</h2>
  <button id="loginBtn">Login Discord</button>
</div>

<div class="form-container" id="formScreen" style="display:none;">
  <h2>Configura il tuo bot</h2>
  <form id="orderForm">
    <input type="text" id="botName" placeholder="Nome bot" required>
    <textarea id="description" placeholder="Descrizione bot"></textarea>
    <input type="text" id="features" placeholder="Funzioni richieste">
    <button type="submit">Invia Ordine</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
