<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>OrderBot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topBar" style="display:none;">
  Loggato come: <span id="discordNick"></span>
  <button id="joinDiscord">Entra nel nostro Discord</button>
</div>

<canvas id="matrix"></canvas>

<div class="main-container">

  <div id="startScreen" class="center-box">
    <h1>OrderBot</h1>
    <button id="loginBtn">Login Discord</button>
  </div>

  <div id="formScreen" class="center-box" style="display:none;">
    <h1>Configura il tuo bot</h1>
    <form id="orderForm">
      <input type="text" id="botName" placeholder="Nome bot" required>
      <textarea id="description" placeholder="Descrizione bot"></textarea>
      <input type="text" id="features" placeholder="Funzioni richieste">
      <button type="submit">Invia Ordine</button>
    </form>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
